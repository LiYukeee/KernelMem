version: 2.1
purpose: >
  Two-layer optimization-rule system:
  (1) machine_check: deterministic, machine-evaluable rules and gating.
  (2) llm_assist: non-binding knowledge (taxonomy/playbooks) used only AFTER gating.

# NOTE ON TERMINOLOGY
# - "code_features" are additional signals about kernel/code structure.
#   They are NOT inherently "soft" or "hard": some are deterministic (hard),
#   others may be heuristic/LLM-assessed.
# - "derived_fields" are computed deterministically from NCU metrics + code_features.

# ===================================================================
# Layer 1: MACHINE-CHECK (deterministic gating)
# ===================================================================
machine_check:

  # ------------------------------
  # 0) Input normalization
  # ------------------------------
  input_normalization:

    # Per-kernel raw NCU keys -> normalized scalar fields
    field_mapping:
      dram_throughput_pct: "gpu__dram_throughput.avg.pct_of_peak_sustained_elapsed"
      l2_throughput_pct: "lts__throughput.avg.pct_of_peak_sustained_elapsed"
      l1_throughput_pct: "l1tex__throughput.avg.pct_of_peak_sustained_active"
      sm_throughput_pct: "sm__throughput.avg.pct_of_peak_sustained_elapsed"

      achieved_occupancy_pct: "sm__warps_active.avg.pct_of_peak_sustained_active"
      registers_per_thread: "launch__registers_per_thread"
      occ_limit_registers_blocks: "launch__occupancy_limit_registers"
      occ_limit_sharedmem_blocks: "launch__occupancy_limit_shared_mem"
      occ_limit_warps_blocks: "launch__occupancy_limit_warps"
      kernel_duration_ns: "gpu__time_duration.avg"  # ns

      # Stall breakdown (keep AVG for stable bottleneck classification)
      stall_long_scoreboard_ratio: "smsp__warp_issue_stalled_long_scoreboard_per_warp_active.ratio"
      stall_short_scoreboard_ratio: "smsp__warp_issue_stalled_short_scoreboard_per_warp_active.ratio"
      stall_no_instruction_ratio: "smsp__warp_issue_stalled_no_instruction_per_warp_active.ratio"
      stall_not_selected_ratio: "smsp__warp_issue_stalled_not_selected_per_warp_active.ratio"

      # Stall breakdown (MAX_RATE for spike / worst-case risk signals)
      stall_long_scoreboard_max: "smsp__warp_issue_stalled_long_scoreboard_per_warp_active.max_rate"
      stall_short_scoreboard_max: "smsp__warp_issue_stalled_short_scoreboard_per_warp_active.max_rate"
      stall_no_instruction_max: "smsp__warp_issue_stalled_no_instruction_per_warp_active.max_rate"
      stall_not_selected_max: "smsp__warp_issue_stalled_not_selected_per_warp_active.max_rate"

      branch_divergent_cnt: "smsp__sass_branch_targets_threads_divergent.avg"
      branch_uniform_cnt: "smsp__sass_branch_targets_threads_uniform.avg"
      pred_on_threads_per_inst: "smsp__thread_inst_executed_pred_on_per_inst_executed.max_rate"

      # Optional: eligibility signal (if present)
      warps_eligible_cnt: "smsp__warps_eligible.avg"

    # ------------------------------------------------------------
    # run_features_schema
    # These keys are provided by the *runner / tracer / profiler* (runtime signals),
    # not by code scanning. They participate in predicates / derived fields.
    # ------------------------------------------------------------
    run_features_schema:
      # Kernel launch count for this benchmark run (runtime-provided)
      kernel_launch_count: {type: int, min: 1, default: 1}

    # ------------------------------------------------------------
    # code_features_schema
    # These keys must be provided by:
    #   - deterministic code scan (preferred) OR
    #   - LLM-assisted structural classifier (acceptable), then validated by range/type
    # They participate in predicates / derived fields.
    # ------------------------------------------------------------
    code_features_schema:
      # Data reuse (mechanism gate for cache/shared-memory methods)
      has_reuse: {type: bool, default: false}
      # Streaming/no-reuse (explicit; do not infer from has_reuse alone)
      streaming_no_reuse: {type: bool, default: true}

      # Vectorization presence/feasibility
      has_vector_load_store: {type: bool, default: false}
      # Gate A (new): aligned vector access (e.g., 16B for float4)
      is_aligned_vector_access: {type: bool, default: true}
      # Gate B (new): tail handling overhead (remainder branch/mask)
      has_tail_handling_overhead: {type: bool, default: false}

      # TensorCore / cuBLASLt eligibility (must be decided from code / dtype / constraints)
      tc_eligible: {type: bool, default: false}

      # ------------------------------
      # NEW: code-structure strong signals (deterministic scan preferred)
      # ------------------------------
      # Pointwise kernel: out[idx] depends only on inp[idx] (no cross-index reads)
      is_pointwise: {type: bool, default: false}

      # Transcendental/SFU-heavy math present (e.g., exp/log/tanh/sin/cos)
      uses_transcendentals: {type: bool, default: false}

      # Naive GEMM signature (explicit K-loop accumulation into out[row,col])
      is_naive_gemm: {type: bool, default: false}
      # Presence of a reduction/accumulation loop (e.g., for(k=0;k<K;k++))
      has_k_loop: {type: bool, default: false}

      # NEW: distinguish GEMM-like K-loop vs Stencil/Conv-like K-loop
      is_gemm_kloop: {type: bool, default: false}
      is_stencil_conv: {type: bool, default: false}

      # Shared-memory tiling present ("__shared__" or extern shared)
      has_shared_memory_tile: {type: bool, default: false}

      # Vector types used (float2/float4/half2) or vectorized casts
      uses_vector_types: {type: bool, default: false}

      # Bounds checks / tail predicate present (if(idx<N) / if(row<B && col<OUT))
      has_bounds_check: {type: bool, default: true}

      # Kernel structure id (0..4): S0..S4
      kernel_structure_id: {type: int, min: 0, max: 4, default: 0}

      # Optional: multi-kernel info (when kernel structure is S4)
      # This can be determined from CUDA candidate / graph capture.
      has_multiple_kernels_in_forward: {type: bool, default: false}
      
      cudagraph_eligible: {type: bool, default: false}

    # ------------------------------------------------------------
    # Derived fields (deterministic): computed from field_mapping + features
    # Disallow strings/enums; expose booleans + numerics.
    # ------------------------------------------------------------
    derived_fields:
      kernel_duration_us: "kernel_duration_ns / 1000"

      branch_divergence_pct: "100 * branch_divergent_cnt / max(1, (branch_divergent_cnt + branch_uniform_cnt))"
      branch_divergence_high: "branch_divergence_pct >= 5"

      # FIX: pred_on_threads_per_inst is a max_rate (upper bound), not an average.
      # Keep it as a coarse signal but avoid turning it into a misleading 'efficiency'.
      # Use it only for gating extreme predication cases.
      pred_on_threads_per_inst_norm: "pred_on_threads_per_inst / 32"
      low_predication_util: "pred_on_threads_per_inst_norm < 0.70"

      # Memory-dependency stall (AVG for classification)
      memory_dependency_stall_ratio: "stall_long_scoreboard_ratio + stall_short_scoreboard_ratio"
      memory_dependency_stall_high: "memory_dependency_stall_ratio >= 0.30"

      # Spike detector (MAX_RATE for risk gating / explanation)
      memory_dependency_stall_spike_ratio: "max(stall_long_scoreboard_max, stall_short_scoreboard_max)"
      memory_dependency_stall_spike_high: "memory_dependency_stall_spike_ratio >= 0.60"

      primary_limiter_util_pct: "max(dram_throughput_pct, l2_throughput_pct, sm_throughput_pct)"

      occupancy_limiter_registers: "(occ_limit_registers_blocks <= occ_limit_warps_blocks) AND (occ_limit_registers_blocks <= occ_limit_sharedmem_blocks)"
      occupancy_limiter_warps: "(occupancy_limiter_registers = false) AND (occ_limit_warps_blocks <= occ_limit_sharedmem_blocks)"
      occupancy_limiter_shared_mem: "(occupancy_limiter_registers = false) AND (occupancy_limiter_warps = false)"

      # Mechanism gate: cache/reuse-based speedups are only plausible if reuse exists.
      # Mechanism gate: cache/reuse-based speedups are only plausible if reuse exists.
      # IMPORTANT: some algorithms have reuse even if the kernel is "naive" (no shared tiles yet),
      # e.g., naive GEMM with a K-loop. We treat those as reuse-capable.
      reuse_possible: "(has_reuse = true) OR (is_naive_gemm = true) OR (is_gemm_kloop = true) OR (is_stencil_conv = true)"

      # "Bytes structurally unavoidable" means: S0 streaming, no reuse, already vectorized.
      bytes_structurally_unavoidable: >
        (kernel_structure_id = 0) AND (streaming_no_reuse = true) AND (has_vector_load_store = true)

      # NEW Gate composite: whether alignment/tail are the likely remaining headroom knobs.
      needs_alignment_or_tail_fix: >
        (is_aligned_vector_access = false) OR (has_tail_handling_overhead = true)

      aligned_and_no_tail_overhead: "(needs_alignment_or_tail_fix = false)"


  # ------------------------------
  # 1) Headroom tiers (deterministic)
  # ------------------------------
  headroom_tiers:
    Tier-H:
      description: "High optimization headroom"
      rule: "primary_limiter_util_pct < 60"
    Tier-M:
      description: "Medium optimization headroom"
      rule: "60 <= primary_limiter_util_pct <= 80"
    Tier-L:
      description: "Low optimization headroom (near ceiling & structurally unavoidable bytes)"
      rule: "primary_limiter_util_pct > 80 AND bytes_structurally_unavoidable = true"


  # ------------------------------
  # 2) Bottleneck priority rules (deterministic)
  # ------------------------------
  bottleneck_priority_rules:
    - id: BandwidthDominatesLatency
      when: "dram_throughput_pct >= 80 OR l2_throughput_pct >= 80"
      force_bottleneck: memory_bandwidth
      note: "Do not classify as memory_latency even if memory-dependency stalls exist."


  # ------------------------------
  # 3) NCU predicate library (machine-evaluable)
  # ------------------------------
  ncu_predicates:
    # Code-feature predicates (for gate_when)
    reuse_possible:
      "reuse_possible = true"
    no_reuse:
      "reuse_possible = false"

    # Explicit streaming/no-reuse flag (do not infer solely from reuse_possible)
    streaming_no_reuse:
      "streaming_no_reuse = true"

    needs_alignment_or_tail_fix:
      "needs_alignment_or_tail_fix = true"
    aligned_and_no_tail_overhead:
      "aligned_and_no_tail_overhead = true"

    # NEW: code-structure strong signals (usable even when NCU is ambiguous)
    is_pointwise:
      "is_pointwise = true"
    transcendental_heavy:
      "uses_transcendentals = true"
    naive_gemm_like:
      "is_naive_gemm = true OR is_gemm_kloop = true"
    
    gemm_rewrite_candidate:
      "tc_eligible = true AND (is_naive_gemm = true OR is_gemm_kloop = true OR has_k_loop = true)"

    stencil_conv_like:
      "is_stencil_conv = true"

    # Throughput / utilization
    high_dram_or_l2_throughput:
      any:
        - "dram_throughput_pct >= 80"
        - "l2_throughput_pct >= 80"
    moderate_dram_throughput:
      all:
        - "dram_throughput_pct >= 40"
        - "dram_throughput_pct < 80"
    low_sm_throughput:
      "sm_throughput_pct < 40"

    # FIX: compute-heavy elementwise kernels often sit in 55~70% SM when dominated by SFU latency.
    high_sm_throughput:
      "sm_throughput_pct >= 70"
    mid_high_sm_throughput:
      "sm_throughput_pct >= 55 AND sm_throughput_pct < 70"

    memory_not_dominant:
      "dram_throughput_pct < 60 AND l2_throughput_pct < 60"

    # NEW: GEMM / tiling-needed signature (captures L1-hot, DRAM/L2-cold, mid-SM)
    high_l1_throughput:
      "l1_throughput_pct >= 70"
    low_dram_and_l2_throughput:
      "dram_throughput_pct < 40 AND l2_throughput_pct < 40"
    mid_sm_throughput:
      "40 <= sm_throughput_pct AND sm_throughput_pct < 70"
    long_kernel_duration:
      "kernel_duration_us >= 50"

    # NEW: L1-saturated + low-SM signature (often uncoalesced / poor locality / instruction-queue pressure)
    l1_hot_and_sm_cold:
      "l1_throughput_pct >= 90 AND sm_throughput_pct < 40"

    # Occupancy
    often_high_occupancy:
      "achieved_occupancy_pct >= 75"
    occupancy_limited_by_registers:
      "occupancy_limiter_registers = true"
    high_registers_per_thread:
      "registers_per_thread >= 96"

    # Divergence / stalls
    high_branch_divergence:
      "branch_divergence_high = true"

    # FIX: previous low_warp_execution_efficiency used a misleading derived metric.
    # We instead gate divergence using branch divergence only (stronger signal) + optional predication util.
    low_predication_util:
      "low_predication_util = true"

    memory_dependency_stalls:
      "memory_dependency_stall_high = true"

    # NEW: explicitly require absence of memory-dependency stalls (for compute bucket disambiguation)
    memory_dependency_stalls_absent:
      "memory_dependency_stall_high = false"

    memory_dependency_stall_spikes:
      "memory_dependency_stall_spike_high = true"

    # Launch overhead
    tiny_kernel_duration:
      "kernel_duration_us <= 10"
    many_kernel_launches:
      "kernel_launch_count >= 10"


  # ------------------------------
  # 4) Kernel structure heuristics (hints) (hints)
  # ------------------------------
  kernel_structures:
    S0:
      name: Streaming-NoReuse
      detect_hints:
        - "single_pass_read_write"
        - "no_shared_memory_reuse"
        - "no_block_reduce"
    S1:
      name: Reuse-Friendly
      detect_hints:
        - "shared_memory_tile_present"
        - "same_input_loaded_multiple_times"
        - "loop_over_k_with_reuse"
    S2:
      name: Irregular
      detect_hints:
        - "gather_scatter"
        - "data_dependent_branch"
        - "non_affine_indexing"
    S3:
      name: Reduction-Scan
      detect_hints:
        - "block_reduce_or_warp_reduce"
        - "atomics"
        - "scan_pattern"
    S4:
      name: MultiKernel-Graph
      detect_hints:
        - "multiple_cuda_kernels_in_forward"
        - "explicit_intermediate_buffers"


  # ------------------------------
  # 5) Global forbidden rules (deterministic veto)
  # ------------------------------
  global_forbidden_rules:
    - id: DecisionTableFirst
      description: >
        A method is legal ONLY IF it appears in allowed_methods of the matched decision_table case.
        The LLM must NOT select directly from playbooks.

    - id: CacheWithoutReuse
      description: >
        Cache/reuse-based optimizations (e.g., __ldg, shared-memory reuse) are forbidden
        unless a concrete reuse source is identified in code.

    - id: NoFakeVectorization
      description: >
        Vectorization refinements must preserve vector width and must not replace a vector load
        with per-lane scalar loads.

    - id: TierLHonesty
      description: >
        When headroom is Tier-L, expected speedup must be acknowledged as small unless byte reduction is feasible.


  # ------------------------------
  # 6) Decision table
  # ------------------------------
  decision_table:

    memory_bandwidth:
      ncu_signature: [high_dram_or_l2_throughput, low_sm_throughput, often_high_occupancy]
      cases:

        # Tier-L + Streaming (S0): decide between (A) alignment/tail fixes vs (B) micro headroom.
        - id: MBW_TierL_S0_ALIGN_OR_TAIL
          headroom: Tier-L
          kernel_structure: S0
          gate_when: "needs_alignment_or_tail_fix = true"
          allowed_methods: [Alignment_and_Tail_Minimization, Vectorization_Refinement]
          forbidden_methods: [CacheReuseBased, SharedMemoryTiling, __ldg_without_reuse]
          expected_speedup: small
          requirements:
            Vectorization_Refinement: [vector_width_preserved]

        - id: MBW_TierL_S0_NO_ALIGN_TAIL_ISSUE
          headroom: Tier-L
          kernel_structure: S0
          gate_when: "aligned_and_no_tail_overhead = true"
          allowed_methods: [Increase_ILP_WorkPerThread, Launch_Tuning]
          forbidden_methods: [CacheReuseBased, SharedMemoryTiling, __ldg_without_reuse]
          expected_speedup: small

        # Tier-H/M + Streaming (S0): there is still room in transactions/coalescing.
        - id: MBW_TierHM_S0
          headroom: [Tier-H, Tier-M]
          kernel_structure: S0
          allowed_methods: [Improve_Coalescing_and_TransactionSize, Reduce_Address_Calculation_Overhead, Increase_Memory_Level_Parallelism]
          forbidden_methods: [CacheReuseBased]

        # Reuse-friendly: allow tiling/prefetch/fusion only if reuse_possible.
        - id: MBW_ReuseFriendly
          headroom: [Tier-H, Tier-M, Tier-L]
          kernel_structure: S1
          gate_when: "reuse_possible = true"
          allowed_methods: [SharedMemoryTiling, RegisterBlocking, SoftwarePrefetching, KernelFusion]

        # If structure says S1 but reuse is not actually present, fall back to no-reuse methods.
        - id: MBW_S1_BUT_NO_REUSE
          headroom: [Tier-H, Tier-M, Tier-L]
          kernel_structure: S1
          gate_when: "reuse_possible = false"
          allowed_methods: [Vectorization_Refinement, Increase_ILP_WorkPerThread, Launch_Tuning]
          expected_speedup: small


        - id: MBW_Reduction_S3_TierHM
          headroom: [Tier-H, Tier-M]
          kernel_structure: S3
          gate_when: "streaming_no_reuse = true AND reuse_possible = false"
          allowed_methods:
            - Improve_Coalescing_and_TransactionSize
            - Increase_Memory_Level_Parallelism
            - Increase_ILP_WorkPerThread
          forbidden_methods:
            - SharedMemoryTiling
            - RegisterBlocking
            - SoftwarePrefetching
          expected_speedup: medium


    # NEW: GEMM / tiling-needed bucket (fixes NO_MATCH for GEMM-like kernels)
    gemm_tiling_needed:
      # NOTE: GEMM kernels can show either mid SM throughput (40~70) or high SM throughput (>=70)
      # depending on tile size, shared-memory pressure, and arithmetic intensity.
      # We therefore accept either mid-sm or high-sm signatures as long as:
      #   - L1/TEX is hot (often shared-mem traffic),
      #   - DRAM/L2 are not dominating, and
      #   - kernel is long-running with high occupancy.
      ncu_signature_any:
        - [high_l1_throughput, low_dram_and_l2_throughput, mid_sm_throughput, often_high_occupancy, long_kernel_duration]
        - [high_l1_throughput, low_dram_and_l2_throughput, high_sm_throughput, often_high_occupancy, long_kernel_duration]
        # NEW: Naive GEMM or K-loop GEMM-like kernels may not have very high L1 yet.
        # Accept them based on low DRAM/L2, mid/high SM, long duration, high occupancy, and code-structure signal.
        - [low_dram_and_l2_throughput, mid_sm_throughput, often_high_occupancy, long_kernel_duration, naive_gemm_like]
        - [low_dram_and_l2_throughput, high_sm_throughput, often_high_occupancy, long_kernel_duration, naive_gemm_like]
        # NEW: Naive GEMM-like kernels with low SM throughput but very long K-loop and low DRAM/L2.
        - [low_dram_and_l2_throughput, low_sm_throughput, long_kernel_duration, naive_gemm_like]
      cases:
        # NOTE: A naive GEMM often looks like S0 in code (no shared tiles),
        # but the *algorithm* has strong reuse (A-row and B-column reused across k).
        # We allow GEMM tiling methods for S0 as long as reuse_possible=true.
        - id: GEMM_REWRITE_CUBLASLT_TF32
          headroom: [Tier-H, Tier-M, Tier-L]
          kernel_structure: [S0, S1, S4]
          gate_when: "tc_eligible = true AND (is_naive_gemm = true OR is_gemm_kloop = true OR has_k_loop = true)"
          allowed_methods: [GEMM_Rewrite_CUBLASLT_TF32]
          expected_speedup: large 
        
        - id: GEMM_TILING_S0_TierHM_TC_OK
          headroom: [Tier-H, Tier-M]
          kernel_structure: S0
          gate_when: "reuse_possible = true AND tc_eligible = true"
          allowed_methods: [TensorCore_or_CUBLASLT, SharedMemoryTiling, RegisterBlocking]
          expected_speedup: large

        - id: GEMM_TILING_S0_TierHM_NO_TC
          headroom: [Tier-H, Tier-M]
          kernel_structure: S0
          gate_when: "reuse_possible = true AND tc_eligible = false"
          allowed_methods: [SharedMemoryTiling, RegisterBlocking]
          expected_speedup: large

        - id: GEMM_TILING_S1_TierHM_TC_OK
          headroom: [Tier-H, Tier-M]
          kernel_structure: S1
          gate_when: "reuse_possible = true AND tc_eligible = true"
          allowed_methods: [TensorCore_or_CUBLASLT, SharedMemoryTiling, RegisterBlocking]
          expected_speedup: large

        - id: GEMM_TILING_S1_TierHM_NO_TC
          headroom: [Tier-H, Tier-M]
          kernel_structure: S1
          gate_when: "reuse_possible = true AND tc_eligible = false"
          allowed_methods: [SharedMemoryTiling, RegisterBlocking]
          expected_speedup: large

        # NEW: S4 multi-kernel/graph cases that still contain a naive GEMM inner kernel.
        # We allow the same tiling / register-blocking / Tensor Core strategies as S0/S1
        # as long as reuse_possible=true (naive GEMM and K-loop provide algorithmic reuse).
        - id: GEMM_TILING_S4_TierHM_TC_OK
          headroom: [Tier-H, Tier-M]
          kernel_structure: S4
          gate_when: "reuse_possible = true AND tc_eligible = true"
          allowed_methods: [TensorCore_or_CUBLASLT, SharedMemoryTiling, RegisterBlocking]
          expected_speedup: large

        - id: GEMM_TILING_S4_TierHM_NO_TC
          headroom: [Tier-H, Tier-M]
          kernel_structure: S4
          gate_when: "reuse_possible = true AND tc_eligible = false"
          allowed_methods: [SharedMemoryTiling, RegisterBlocking]
          expected_speedup: large

    # NEW: L1-saturated & SM-cold (often uncoalesced / poor locality / instruction-queue pressure)
    l1_saturated_access_pathology:
      ncu_signature: [high_l1_throughput, low_dram_and_l2_throughput, low_sm_throughput, often_high_occupancy, long_kernel_duration]
      cases:
        - id: L1HOT_SMCOLD_S0_TierHM
          headroom: [Tier-H, Tier-M]
          kernel_structure: S0
          allowed_methods: [Improve_Coalescing_and_TransactionSize, SharedMemoryTiling, TensorCore_or_CUBLASLT, KernelFission]
          expected_speedup: large

    memory_latency:
      # NOTE: This bucket captures cases where warps are frequently scoreboarding on memory (long/short scoreboard)
      # AND DRAM is not yet at the hard ceiling. We further disambiguate by code-structure:
      #   - streaming/no-reuse pointwise (best handled by transaction-size + MLP/ILP)
      #   - reuse-capable kernels (allow software prefetch)
      #   - reduction/scan-style kernels (S3) where both SM and DRAM are in the mid range but long scoreboard stalls dominate.
      #
      # We therefore accept two NCU signatures:
      #   (1) classic:    moderate_dram_throughput + low_sm_throughput + memory_dependency_stalls
      #   (2) reduction:  moderate_dram_throughput + memory_dependency_stalls + often_high_occupancy
      ncu_signature_any:
        - [moderate_dram_throughput, low_sm_throughput, memory_dependency_stalls]
        - [moderate_dram_throughput, memory_dependency_stalls, often_high_occupancy]
      cases:

        # --------------------------------------------
        # (A) Streaming / no-reuse pointwise (S0/S1): avoid prefetch-based methods.
        # Typical examples: leaky_relu/relu/abs/clip where each element is read once and written once.
        # --------------------------------------------
        - id: ML_STREAMING_POINTWISE_NO_REUSE_TierHM
          headroom: [Tier-H, Tier-M]
          kernel_structure: [S0, S1]
          gate_when: "is_pointwise = true AND streaming_no_reuse = true AND reuse_possible = false"
          allowed_methods:
            - Improve_Coalescing_and_TransactionSize
            - Increase_Memory_Level_Parallelism
            - Increase_ILP_WorkPerThread
          forbidden_methods: [SoftwarePrefetching, SharedMemoryTiling, RegisterBlocking]
          expected_speedup: medium

        # --------------------------------------------
        # (B) Reuse-capable latency kernels: software prefetch can help (e.g., loops with reuse, GEMM-like, stencils).
        # --------------------------------------------
        - id: ML_REUSE_CAPABLE_TierHM
          headroom: [Tier-H, Tier-M]
          kernel_structure: [S0, S1]
          gate_when: "reuse_possible = true"
          allowed_methods:
            - SoftwarePrefetching
            - Increase_ILP_WorkPerThread
            - Increase_Occupancy_if_limited
          expected_speedup: medium

        # --------------------------------------------
        # (C) Reduction/scan-style latency kernels (S3): grid-stride loops over large HW with
        #     high occupancy and long scoreboard stalls from global memory.
        #     Typical examples: block-level reductions that read each element once and
        #     accumulate into per-(N,C) outputs.
        # --------------------------------------------
        - id: ML_REDUCTION_SCAN_S3_TierH
          headroom: Tier-H
          kernel_structure: S3
          gate_when: "streaming_no_reuse = true AND reuse_possible = false"
          allowed_methods:
            - Increase_Memory_Level_Parallelism
            - Increase_ILP_WorkPerThread
            - Improve_Coalescing_and_TransactionSize
          forbidden_methods:
            - SoftwarePrefetching
            - SharedMemoryTiling
            - RegisterBlocking
            - Increase_Occupancy_if_limited
          expected_speedup: medium

        # --------------------------------------------
        # (D) Fallback: if code-features are missing/unknown, keep a conservative safe set.
        # --------------------------------------------
        - id: ML_FALLBACK_TierHM
          headroom: [Tier-H, Tier-M]
          kernel_structure: [S0, S1]
          allowed_methods: [Increase_ILP_WorkPerThread, Increase_Occupancy_if_limited]
          expected_speedup: small


    compute:
      # FIX: split compute bucket into (A) truly high-SM and (B) mid-high-SM (SFU/latency dominated).
      # Disambiguation: exclude kernels dominated by memory-dependency stalls (those belong to memory_latency).
      ncu_signature_any:
        - [high_sm_throughput, memory_not_dominant, memory_dependency_stalls_absent]
        - [mid_high_sm_throughput, memory_not_dominant, long_kernel_duration, memory_dependency_stalls_absent]
      cases:
        # NEW: Pointwise + transcendentals (e.g., mish/gelu/swish) is best optimized by reducing/approximating SFU.
        # This mapping can be triggered by deterministic code scan even if NCU signatures are noisy.
        - id: CMP_Transcendental_Pointwise
          headroom: [Tier-H, Tier-M]
          kernel_structure: [S0, S1]
          gate_when: "uses_transcendentals = true AND is_pointwise = true"
          allowed_methods: [Approximate_Transcendentals_or_LUT, Reduce_Instruction_Count, Vectorized_Math]
          expected_speedup: medium

        - id: CMP_StencilConv_Naive
          headroom: [Tier-H, Tier-M]
          # accept S2 (ideal) and S3 (your current misclassification)
          kernel_structure: [S2, S3]
          gate_when: "stencil_conv_like = true"
          allowed_methods: [SharedMemoryTiling, Improve_Coalescing_and_TransactionSize]
          expected_speedup: large

        - id: CMP_Elementwise
          headroom: [Tier-H, Tier-M]
          kernel_structure: [S0, S1]
          gate_when: "is_pointwise = true"
          allowed_methods: [Reduce_Instruction_Count, Vectorized_Math]

        # NEW: Irregular compute-bound kernels (S2), e.g., custom conv/conv_transpose with
        # heavy per-thread math, complex indexing, and low DRAM/L2 utilization.
        - id: CMP_Irregular_Compute_S2
          headroom: [Tier-H, Tier-M]
          kernel_structure: S2
          # Any S2 kernel that satisfies the compute ncu_signature_any falls into this case.
          allowed_methods:
            - Reduce_Instruction_Count
            - WarpUniformControlFlow
            - KernelFission
          expected_speedup: medium


    register_pressure:
      ncu_signature: [occupancy_limited_by_registers, high_registers_per_thread]
      cases:
        - id: REG_TierHM
          headroom: [Tier-H, Tier-M]
          kernel_structure: [S0, S1, S2, S3]
          allowed_methods: [Reduce_Live_Ranges, Reduce_Unrolling, SharedMemory_Tradeoff_if_Beneficial]


    divergence:
      # FIX: remove dependence on misleading warp_execution_efficiency and use branch divergence directly.
      ncu_signature: [high_branch_divergence, memory_not_dominant]
      cases:
        - id: DIV_TierHM_Generic
          headroom: [Tier-H, Tier-M]
          kernel_structure: [S0, S1, S2]
          allowed_methods: [WarpUniformControlFlow, KernelFission]


    launch_overhead:
      ncu_signature: [tiny_kernel_duration, many_kernel_launches]
      cases:
        - id: LAUNCH_S4_CUDAGRAPH
          headroom: [Tier-H, Tier-M, Tier-L]
          kernel_structure: S4
          gate_when: "has_multiple_kernels_in_forward = true AND cudagraph_eligible = true"
          allowed_methods: [CUDA_Graph_Capture_Replay_StaticBuffers]
          expected_speedup: medium

        - id: LAUNCH_S4_FUSION_OR_SCHED
          headroom: [Tier-H, Tier-M, Tier-L]
          kernel_structure: S4
          gate_when: "has_multiple_kernels_in_forward = true AND cudagraph_eligible = false"
          allowed_methods: [KernelFusion, MultiKernelScheduling]
          expected_speedup: small
          
    # Fallback bottlenecks (no ncu_signature required, checked only if no signature-based bottleneck matches)
    # These are code-structure-based fallbacks that rely solely on gate_when conditions
    code_structure_fallback:
      # No ncu_signature: this bottleneck is checked as a fallback when no signature-based bottleneck matches
      cases:
        # Fallback for CUDA Graph (when launch_overhead signature doesn't match but code structure suggests multiple kernels)
        - id: LAUNCH_S4_CUDAGRAPH_FALLBACK
          headroom: [Tier-H, Tier-M, Tier-L]
          kernel_structure: S4
          gate_when: "has_multiple_kernels_in_forward = true AND cudagraph_eligible = true"
          allowed_methods: [CUDA_Graph_Capture_Replay_StaticBuffers]
          expected_speedup: medium


        # Fallback for GEMM_Rewrite_CUBLASLT_TF32 (when NCU signature doesn't match but code structure suggests GEMM)
        - id: GEMM_REWRITE_CUBLASLT_TF32_FALLBACK
          headroom: [Tier-H, Tier-M, Tier-L]
          kernel_structure: [S0, S1, S4]
          gate_when: "tc_eligible = true AND (is_naive_gemm = true OR is_gemm_kloop = true OR has_k_loop = true)"
          allowed_methods: [GEMM_Rewrite_CUBLASLT_TF32]
          expected_speedup: large
        




