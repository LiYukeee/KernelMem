  method_catalog:
    # ------------------------------
    # Core compute/elementwise
    # ------------------------------
    CUDA_Graph_Capture_Replay_StaticBuffers:
      intent: >
        Cache forward execution sequence with torch.cuda.CUDAGraph and pin memory addresses
        using static CUDA tensors (static inputs/outputs) to accelerate replay.
      mechanism_requirements:
        - multi_kernel_forward
        - static_shapes_assumed_in_benchmark
        - allocate_static_buffers
        - warmup_before_capture
        - capture_once_replay_many
      # Instance knowledge: GRU + CUDA Graph with static buffers (capture once, replay many).
      implementation_case:
        - |
          class ModelNew(nn.Module):
              def __init__(self, input_size, hidden_size, num_layers=3, bias=True, batch_first=False):
                  super().__init__()
                  self.gru = nn.GRU(...)  # parameter holder / reference computation
                  # CUDA Graph state
                  self._graph_captured = False
                  self._graph = None
                  self._graph_stream = torch.cuda.Stream()
                  # Static buffers for replay (addresses fixed)
                  self._static_x = None
                  self._static_h0 = None
                  self._static_out = None

              def _capture_graph(self, x, h0):
                  # Static inputs with fixed addresses
                  self._static_x = torch.empty_like(x).contiguous()
                  self._static_h0 = torch.empty_like(h0).contiguous()
                  # Warmup to trigger internal algo selection / workspace allocs
                  out0, _ = self.gru(self._static_x, self._static_h0)
                  self._static_out = torch.empty_like(out0).contiguous()
                  torch.cuda.synchronize()
                  with torch.cuda.stream(self._graph_stream):
                      self._graph = torch.cuda.CUDAGraph()
                      self._static_x.copy_(x)
                      self._static_h0.copy_(h0)
                      with torch.cuda.graph(self._graph):
                          out, _ = self.gru(self._static_x, self._static_h0)
                          self._static_out.copy_(out)
                  torch.cuda.synchronize()
                  self._graph_captured = True

              def forward(self, x, h0):
                  # Keep exact reference behavior in training
                  if self.training or (not x.is_cuda):
                      out, _ = self.gru(x, h0)
                      return out
                  x = x.contiguous()
                  h0 = h0.contiguous()
                  # Re-capture if shape/dtype/device changes
                  if (not self._graph_captured) or (self._static_x is None) or \
                     (x.shape != self._static_x.shape) or (h0.shape != self._static_h0.shape) or \
                     (x.dtype != self._static_x.dtype) or (h0.dtype != self._static_h0.dtype) or \
                     (x.device != self._static_x.device) or (h0.device != self._static_h0.device):
                      self._graph_captured = False
                      self._capture_graph(x, h0)
                  self._static_x.copy_(x)
                  self._static_h0.copy_(h0)
                  self._graph.replay()
                  return self._static_out
          # Key: static buffers (empty_like + contiguous), warmup then capture on dedicated stream, replay(); skip capture in training.
      expected_metric_change:
        - "kernel_launch_count effective cost down"
        - "end_to_end_time down"
      forbidden_patterns:
        - "capture with dynamic allocations in replay path"
        - "recapture every iteration for same shapes"
        - "use in training path"    
    
    Reduce_Instruction_Count:
      intent: "Reduce total dynamic instruction count (remove redundant ops, hoist invariants, simplify expressions)"
      mechanism_requirements:
        - "correctness_preserved"
      expected_metric_change:
        - "sm_throughput_pct up"
        - "issued_ipc up"
        - "kernel_duration_us down"
      forbidden_patterns:
        - "extra global loads"
        - "unnecessary recompute of invariants"

    # ------------------------------
    # No-reuse / streaming memory kernels
    # ------------------------------
    Improve_Coalescing_and_TransactionSize:
      intent: "Maximize effective global-memory bandwidth by improving coalescing, alignment, and widening load/store transactions."
      mechanism_requirements:
        - contiguous_or_regular_strides
        - preserve_semantics
      expected_metric_change:
        - "dram_throughput_pct up"
        - "l2_throughput_pct up (sometimes)"
        - "stall_long_scoreboard_ratio down"
        - "kernel_duration_us down"
      forbidden_patterns:
        - "replace vector loads with scalar per-lane loads"
        - "introduce extra global reads/writes"
        - "misaligned wide loads without safe tail handling"

    Increase_Memory_Level_Parallelism:
      intent: "Increase the number of concurrent outstanding memory requests (MLP) so warps hide global-memory latency more effectively."
      mechanism_requirements:
        - "no_reuse_or_low_reuse_ok"
        - "independent memory accesses per thread/warp"
      expected_metric_change:
        - "stall_long_scoreboard_ratio down"
        - "warps_eligible_cnt up (if present)"
        - "kernel_duration_us down"
      forbidden_patterns:
        - "increase registers so much that occupancy collapses"
        - "excessive unrolling that triggers spilling"

    Increase_ILP_WorkPerThread:
      intent: "Increase instruction-level parallelism and useful work per thread (e.g., process multiple elements per thread using grid-stride loops and controlled unrolling)."
      mechanism_requirements:
        - "outputs are independent across elements"
        - "safe bounds/tail handling"
      expected_metric_change:
        - "stall_long_scoreboard_ratio down"
        - "issued_ipc up"
        - "kernel_duration_us down"
      forbidden_patterns:
        - "large unroll factors that cause register spilling"
        - "introduce divergent control flow"

    SoftwarePrefetching:
      intent: "Prefetch data that will be reused after a known latency window (useful only when reuse exists)."
      mechanism_requirements:
        - "reuse_identified"
        - "prefetch_distance_tuned"
      expected_metric_change:
        - "memory_dependency_stall_ratio down"
        - "l1_throughput_pct up (sometimes)"
        - "kernel_duration_us down"
      forbidden_patterns:
        - "apply to streaming_no_reuse kernels"
        - "prefetch without a proven reuse source"

    Increase_Occupancy_if_limited:
      intent: "Increase active warps when occupancy is actually limited (e.g., by registers or shared memory), to improve latency hiding."
      mechanism_requirements:
        - "occupancy_limited_by_registers OR occupancy_limiter_shared_mem OR occupancy_limiter_warps"
      expected_metric_change:
        - "achieved_occupancy_pct up"
        - "warps_eligible_cnt up (sometimes)"
        - "kernel_duration_us down (sometimes)"
      forbidden_patterns:
        - "reduce occupancy at the same time via increased register pressure"
        - "change algorithmic work or precision"

    SharedMemoryTiling:
      intent: "Use shared-memory tiling to exploit data reuse across threads/outputs (e.g., stencil/conv spatial reuse)."
      mechanism_requirements:
        - "reuse_identified"
        - "tile_shape_defined"
        - "shared_memory_budget_respected"
      expected_metric_change:
        - "l1_throughput_pct up (often)"
        - "stall_long_scoreboard_ratio down"
        - "kernel_duration_us down"
      forbidden_patterns:
        - "increase shared memory so much that occupancy collapses"
        - "load tile but no reuse in inner loops"

    Reduce_Address_Calculation_Overhead:
      intent: "Hoist/simplify index math and pointer arithmetic; reduce integer ALU pressure."
      mechanism_requirements:
        - "correctness_preserved"
      expected_metric_change:
        - "sm_throughput_pct up"
        - "issued_ipc up"
        - "kernel_duration_us down"
      forbidden_patterns:
        - "introduce extra global loads"

    # ------------------------------
    # Vectorization / alignment / tails
    # ------------------------------
    Alignment_and_Tail_Minimization:
      intent: "Fix misalignment and reduce tail-handling overhead for wide vector loads/stores (e.g., float4/half2), so memory transactions are efficient."
      mechanism_requirements:
        - preserve_vector_width
        - aligned_vector_access_or_safe_fallback
        - safe_tail_handling
        - preserve_semantics
      expected_metric_change:
        - "dram_throughput_pct up (sometimes)"
        - "l2_throughput_pct up (sometimes)"
        - "kernel_duration_us down"
        - "stall_long_scoreboard_ratio down (sometimes)"
      forbidden_patterns:
        - "replace vector loads with scalar per-lane loads"
        - "assume alignment without proof"
        - "unsafe out-of-bounds in tail path"
        - "introduce extra global reads/writes"

    Vectorization_Refinement:
      intent: "Refine existing vectorized access (keep width), improve alignment/coalescing, reduce remainder branching/masking overhead."
      mechanism_requirements:
        - vector_width_preserved
        - contiguous_or_regular_strides
        - alignment_checked
        - safe_tail_handling
        - preserve_semantics
      expected_metric_change:
        - "dram_throughput_pct up (sometimes)"
        - "issued_ipc up (sometimes)"
        - "kernel_duration_us down"
      forbidden_patterns:
        - "fake vectorization (scalarize lanes)"
        - "misaligned wide loads without fallback"
        - "extra address recompute per lane"
    
    GEMM_Rewrite_CUBLASLT_TF32:
      intent: >
        Replace GEMM/matmul/Linear mainloop by a load_inline CUDA extension
        calling cuBLASLt cublasLtMatmul with TF32 Tensor Core math.
      mechanism_requirements:
        - tc_eligible_true
        - naive_gemm_like_or_graph_gemm_present
        - preserve_parameter_parity_if_any
        - bias_applied_correctly_if_present
      # Instance knowledge: reference cuBLASLt TF32 GEMM (A[M,K] * W[N,K]^T = C[M,N], row-major, getHeuristic + algo).
      implementation_case:
        - |
          // Reference: cuBLASLt TF32 GEMM for Linear (y = x @ W^T + b). W is [N,K] row-major (linear.weight).
          struct LtHandle {
            cublasLtHandle_t h;
            LtHandle() { cublasLtCreate(&h); }
            ~LtHandle() { cublasLtDestroy(h); }
          };
          torch::Tensor gemm_cublaslt_tf32_rowmajor(
              torch::Tensor A,   // [M,K] row-major float32
              torch::Tensor W,   // [N,K] row-major float32 (linear.weight)
              bool transW        // if true: C = A * W^T
          ){
            TORCH_CHECK(A.is_cuda() && W.is_cuda(), "A/W must be CUDA");
            TORCH_CHECK(A.dtype() == torch::kFloat32 && W.dtype() == torch::kFloat32, "float32 only");
            TORCH_CHECK(A.is_contiguous() && W.is_contiguous(), "A/W must be contiguous");
            TORCH_CHECK(A.dim() == 2 && W.dim() == 2, "A/W must be 2D");
            int64_t M = A.size(0);
            int64_t K = A.size(1);
            int64_t N = W.size(0);
            TORCH_CHECK(W.size(1) == K, "W must be [N,K]");
            auto C = torch::empty({M, N}, A.options());
            LtHandle lt;
            auto stream = at::cuda::getDefaultCUDAStream();
            float alpha = 1.0f;
            float beta  = 0.0f;
            cublasOperation_t opA = CUBLAS_OP_N;
            cublasOperation_t opB = transW ? CUBLAS_OP_T : CUBLAS_OP_N;
            cublasComputeType_t computeType = CUBLAS_COMPUTE_32F_FAST_TF32;
            cudaDataType_t scaleType = CUDA_R_32F;
            cublasLtMatmulDesc_t matmulDesc;
            CUBLAS_CHECK(cublasLtMatmulDescCreate(&matmulDesc, computeType, scaleType));
            CUBLAS_CHECK(cublasLtMatmulDescSetAttribute(matmulDesc, CUBLASLT_MATMUL_DESC_TRANSA, &opA, sizeof(opA)));
            CUBLAS_CHECK(cublasLtMatmulDescSetAttribute(matmulDesc, CUBLASLT_MATMUL_DESC_TRANSB, &opB, sizeof(opB)));
            cublasLtMatrixLayout_t layoutA, layoutB, layoutC;
            { int64_t lda = K;
              CUBLAS_CHECK(cublasLtMatrixLayoutCreate(&layoutA, CUDA_R_32F, (uint64_t)M, (uint64_t)K, lda));
              cublasLtOrder_t order = CUBLASLT_ORDER_ROW;
              CUBLAS_CHECK(cublasLtMatrixLayoutSetAttribute(layoutA, CUBLASLT_MATRIX_LAYOUT_ORDER, &order, sizeof(order))); }
            { int64_t ldb = K;  // W is [N,K] row-major
              CUBLAS_CHECK(cublasLtMatrixLayoutCreate(&layoutB, CUDA_R_32F, (uint64_t)N, (uint64_t)K, ldb));
              cublasLtOrder_t order = CUBLASLT_ORDER_ROW;
              CUBLAS_CHECK(cublasLtMatrixLayoutSetAttribute(layoutB, CUBLASLT_MATRIX_LAYOUT_ORDER, &order, sizeof(order))); }
            { int64_t ldc = N;
              CUBLAS_CHECK(cublasLtMatrixLayoutCreate(&layoutC, CUDA_R_32F, (uint64_t)M, (uint64_t)N, ldc));
              cublasLtOrder_t order = CUBLASLT_ORDER_ROW;
              CUBLAS_CHECK(cublasLtMatrixLayoutSetAttribute(layoutC, CUBLASLT_MATRIX_LAYOUT_ORDER, &order, sizeof(order))); }
            cublasLtMatmulPreference_t pref;
            CUBLAS_CHECK(cublasLtMatmulPreferenceCreate(&pref));
            size_t workspaceSize = 1 << 22;
            auto workspace = torch::empty({(int64_t)workspaceSize}, torch::TensorOptions().dtype(torch::kUInt8).device(A.device()));
            CUBLAS_CHECK(cublasLtMatmulPreferenceSetAttribute(pref, CUBLASLT_MATMUL_PREF_MAX_WORKSPACE_BYTES, &workspaceSize, sizeof(workspaceSize)));
            cublasLtMatmulHeuristicResult_t heur;
            int returned = 0;
            cublasStatus_t hs = cublasLtMatmulAlgoGetHeuristic(lt.h, matmulDesc, layoutA, layoutB, layoutC, layoutC, pref, 1, &heur, &returned);
            cublasLtMatmulAlgo_t* algo = nullptr;
            if (hs == CUBLAS_STATUS_SUCCESS && returned > 0) algo = &heur.algo;
            cublasStatus_t st = cublasLtMatmul(lt.h, matmulDesc, &alpha,
              A.data_ptr<float>(), layoutA, W.data_ptr<float>(), layoutB, &beta,
              C.data_ptr<float>(), layoutC, C.data_ptr<float>(), layoutC,
              algo, workspace.data_ptr<uint8_t>(), workspaceSize, stream);
            CUBLAS_CHECK(cublasLtMatmulPreferenceDestroy(pref));
            CUBLAS_CHECK(cublasLtMatmulDescDestroy(matmulDesc));
            CUBLAS_CHECK(cublasLtMatrixLayoutDestroy(layoutA));
            CUBLAS_CHECK(cublasLtMatrixLayoutDestroy(layoutB));
            CUBLAS_CHECK(cublasLtMatrixLayoutDestroy(layoutC));
            TORCH_CHECK(st == CUBLAS_STATUS_SUCCESS, "cublasLtMatmul failed status=", (int)st);
            return C;
          }
          // Call with transW=true for Linear (C = A * W^T). Add bias after GEMM if present. Read weight/bias in forward(), not __init__.
      expected_metric_change:
        - "sm_throughput_pct up (often)"
        - "kernel_duration_us down"
      forbidden_patterns:
        - "call torch.matmul/nn.Linear for the replaced mainloop"
        - "use cuBLAS (non-Lt) without explicit TF32 TensorCore computeType"
        - "drop bias"
        - "cache weight or bias (or weight.T) in __init__; they must be read in forward so they follow model.to(device)"
        - "omit bias add when reference Linear has bias"
        - "use extension in training path without PyTorch fallback (breaks autograd)"

    # ------------------------------
    # Launch / tuning
    # ------------------------------
    Launch_Tuning:
      intent: "Tune block size, grid-stride, unroll factors, and work partitioning to improve occupancy/ILP without changing algorithm."
      mechanism_requirements:
        - benchmark_constraints_respected
        - preserve_semantics
        - avoid_spilling
      expected_metric_change:
        - "achieved_occupancy_pct up (sometimes)"
        - "issued_ipc up (sometimes)"
        - "kernel_duration_us down (sometimes)"
      forbidden_patterns:
        - "aggressive unrolling causing spilling"
        - "reduce occupancy via register explosion"
        - "change dtype/layout/precision"

    # ------------------------------
    # Reuse / tiling / blocking
    # ------------------------------
    RegisterBlocking:
      intent: "Increase arithmetic intensity by reusing data in registers (micro-tiling / multiple outputs per thread, accumulate in registers)."
      mechanism_requirements:
        - reuse_identified
        - register_budget_respected
        - preserve_semantics
        - avoid_spilling
      expected_metric_change:
        - "sm_throughput_pct up (sometimes)"
        - "dram_throughput_pct down (sometimes, due to reduced traffic)"
        - "kernel_duration_us down"
      forbidden_patterns:
        - "register usage explosion causing occupancy collapse"
        - "spilling to local memory"
        - "add extra global memory traffic"

    TensorCore_or_CUBLASLT:
      intent: "Use Tensor Cores / cuBLASLt GEMM path when dtype/layout/size constraints permit to greatly increase math throughput."
      mechanism_requirements:
        - tc_eligible_true
        - dtype_layout_supported
        - preserve_semantics
        - benchmark_constraints_respected
      expected_metric_change:
        - "sm_throughput_pct up"
        - "kernel_duration_us down"
        - "dram_throughput_pct may stay low (compute-dominant)"
      forbidden_patterns:
        - "force TC path when not eligible"
        - "change numerical precision without approval"
        - "implicit layout transforms that add extra kernels unless allowed"

    # ------------------------------
    # Multi-kernel scope
    # ------------------------------
    KernelFusion:
      intent: "Fuse adjacent kernels (producer-consumer) to reduce global memory round-trips and launch overhead."
      mechanism_requirements:
        - multi_kernel_only
        - intermediate_is_fusible
        - preserve_semantics
        - memory_footprint_respected
      expected_metric_change:
        - "kernel_launch_count down"
        - "dram_throughput_pct down (sometimes, less traffic)"
        - "kernel_duration_us down (end-to-end)"
      forbidden_patterns:
        - "fuse across incompatible layouts/dtypes"
        - "introduce extra global reads/writes"
        - "increase register/shared usage so much that performance regresses"

    KernelFission:
      intent: "Split a monolithic kernel into simpler stages to reduce divergence/register pressure or isolate heavy math from memory ops."
      mechanism_requirements:
        - preserve_semantics
        - fission_benefit_explained
        - avoid_excess_launch_overhead
      expected_metric_change:
        - "registers_per_thread down (sometimes)"
        - "branch_divergence_pct down (sometimes)"
        - "kernel_duration_us down (sometimes, but can increase if overhead dominates)"
      forbidden_patterns:
        - "split into too many kernels (launch overhead dominates)"
        - "extra global traffic that outweighs benefits"
        - "break synchronization/ordering assumptions"

    MultiKernelScheduling:
      intent: "Reorder/schedule multiple kernels (or overlap) to reduce confirmed launch overhead or improve pipeline efficiency (only when S4 and allowed)."
      mechanism_requirements:
        - multi_kernel_only
        - benchmark_constraints_respected
        - preserve_semantics
      expected_metric_change:
        - "kernel_launch_count effective cost down"
        - "end_to_end_time down"
      forbidden_patterns:
        - "change algorithmic dependency order"
        - "introduce nondeterministic races"
        - "assume overlap without evidence"

    # ------------------------------
    # Control-flow / divergence
    # ------------------------------
    WarpUniformControlFlow:
      intent: "Reduce warp divergence by making branches warp-uniform (predication, branch hoisting, grouping paths, restructure indexing)."
      mechanism_requirements:
        - preserve_semantics
        - divergence_source_identified
        - avoid_extra_global_loads
      expected_metric_change:
        - "branch_divergence_pct down"
        - "sm_throughput_pct up (sometimes)"
        - "kernel_duration_us down"
      forbidden_patterns:
        - "turn divergence into heavy predication that increases instruction count too much"
        - "introduce extra global memory accesses"
        - "complex control flow that worsens instruction cache/issue"

    # ------------------------------
    # Math / SFU
    # ------------------------------
    Approximate_Transcendentals_or_LUT:
      intent: "Replace expensive transcendental ops with approximations or lookup tables when accuracy constraints permit."
      mechanism_requirements:
        - uses_transcendentals_true
        - error_budget_defined_or_preserve_framework_equivalence
        - preserve_semantics_or_approved_approx
      expected_metric_change:
        - "sm_throughput_pct up"
        - "issued_ipc up (sometimes)"
        - "kernel_duration_us down"
      forbidden_patterns:
        - "unapproved precision/accuracy loss"
        - "large LUT in global memory causing extra bandwidth pressure"
        - "introduce divergent table lookups"

    Vectorized_Math:
      intent: "Use vector math/data types (half2/float2/float4) and fuse operations to increase math throughput and reduce instruction count."
      mechanism_requirements:
        - uses_vector_types_or_feasible
        - alignment_checked
        - preserve_semantics
        - safe_tail_handling
      expected_metric_change:
        - "issued_ipc up (sometimes)"
        - "sm_throughput_pct up (sometimes)"
        - "kernel_duration_us down"
      forbidden_patterns:
        - "scalarize vector lanes"
        - "misaligned vector ops without fallback"
        - "increase register pressure causing spilling"

    # ------------------------------
    # Register pressure mitigation (for register_pressure bucket)
    # ------------------------------
    Reduce_Live_Ranges:
      intent: "Reduce concurrent live values (reorder computation, reuse registers, limit temporaries) to lower register usage and improve occupancy."
      mechanism_requirements:
        - preserve_semantics
        - register_pressure_source_identified
        - avoid_spilling
      expected_metric_change:
        - "registers_per_thread down"
        - "achieved_occupancy_pct up (sometimes)"
        - "kernel_duration_us down (sometimes)"
      forbidden_patterns:
        - "add extra global loads to recompute values"
        - "increase instruction count excessively"
        - "cause spills via poor scheduling"

    Reduce_Unrolling:
      intent: "Reduce unroll factors to cut register pressure and avoid spills while keeping enough ILP."
      mechanism_requirements:
        - unroll_factor_adjusted
        - preserve_semantics
        - avoid_spilling
      expected_metric_change:
        - "registers_per_thread down (sometimes)"
        - "achieved_occupancy_pct up (sometimes)"
        - "kernel_duration_us down (sometimes)"
      forbidden_patterns:
        - "remove all unrolling and lose ILP dramatically"
        - "increase branch overhead unnecessarily"
        - "change algorithmic behavior"

    SharedMemory_Tradeoff_if_Beneficial:
      intent: "Trade shared memory for registers (or vice versa) to improve occupancy and latency hiding when register-limited."
      mechanism_requirements:
        - occupancy_limited_by_registers_or_sharedmem
        - preserve_semantics
        - shared_memory_budget_respected
      expected_metric_change:
        - "achieved_occupancy_pct up (sometimes)"
        - "stall_long_scoreboard_ratio down (sometimes)"
        - "kernel_duration_us down (sometimes)"
      forbidden_patterns:
        - "increase shared memory so much that occupancy collapses"
        - "add shared-memory traffic without reuse benefit"
        - "introduce bank conflicts without mitigation"
